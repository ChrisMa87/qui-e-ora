<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qui e Ora</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="./icon-192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <!-- App Container -->
    <div id="app-container">

        <!-- Floating Button for Brain Dump -->
        <button id="btn-fab-dump" class="fab fade-up" aria-label="Aggiungi">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>

        <!-- VIEW 1: TIME SELECTION -->
        <section id="view-time" class="view active">
            <div class="content-wrapper centered">
                <h1 class="title-text fade-up">Quanto tempo hai?</h1>

                <div class="slider-container fade-up delay-1">
                    <input type="range" id="time-slider" min="0" max="4" value="2" step="1">
                    <div class="slider-labels">
                        <span>5m</span>
                        <span>15m</span>
                        <span>30m</span>
                        <span>60m+</span>
                        <span>∞</span>
                    </div>
                </div>

                <button id="btn-start" class="btn-primary fade-up delay-2">Inizia</button>
                <div style="display: flex; gap: 1rem; margin-top: 1rem;" class="fade-up delay-2 mt-4">
                    <button id="btn-add-task" class="btn-secondary"
                        style="font-size: 1rem; text-decoration: underline;">Aggiungi attività</button>
                    <button id="btn-view-list" class="btn-secondary"
                        style="font-size: 1rem; text-decoration: underline;">Tutte le attività</button>
                </div>
            </div>
        </section>

        <!-- VIEW 2: FOCUS MODE -->
        <section id="view-focus" class="view">
            <button id="btn-back-time" class="top-left-btn fade-up" aria-label="Indietro">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>

            <div class="content-wrapper centered">
                <div id="focus-content">
                    <h2 id="focus-task-title" class="task-title fade-up">...</h2>
                    <div class="task-meta fade-up delay-1">
                        <span id="focus-task-time" class="badge"></span>
                        <span id="focus-task-tags" class="badge"></span>
                    </div>

                    <div class="action-buttons fade-up delay-2">
                        <button id="btn-done" class="btn-primary">Fatto!</button>
                        <button id="btn-later" class="btn-secondary">Più tardi</button>
                    </div>
                </div>

                <div id="focus-empty" class="hidden fade-up">
                    <p class="title-text" style="font-size:1.5rem">Nessuna attività trovata per questo contesto.</p>
                    <button id="btn-empty-back" class="btn-secondary mt-4">Indietro</button>
                </div>
            </div>
        </section>

        <!-- VIEW 3: BRAIN DUMP -->
        <section id="view-dump" class="view">
            <button id="btn-close-dump" class="top-left-btn fade-up" aria-label="Chiudi">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>

            <div class="content-wrapper align-start">
                <h1 class="dump-title fade-up">Cosa c'è nella tua testa?</h1>

                <div class="fade-up delay-1" style="width: 100%; margin-bottom: 3rem;">
                    <input type="text" id="dump-input" class="minimal-input" placeholder="es. Leggere un libro"
                        autocomplete="off" spellcheck="false">
                </div>

                <div class="slider-container fade-up delay-2">
                    <p id="dump-time-label"
                        style="text-align: center; color: var(--text-secondary); margin-bottom: 0.5rem;">Dauer: 30 min
                    </p>
                    <input type="range" id="dump-time-slider" min="0" max="5" value="2" step="1">
                    <div class="slider-labels">
                        <span>5m</span>
                        <span>15m</span>
                        <span>30m</span>
                        <span>45m</span>
                        <span>60m</span>
                        <span>∞</span>
                    </div>
                </div>

                <div class="toggle-container fade-up delay-2"
                    style="margin-top: 2rem; display: flex; align-items: center; justify-content: center; gap: 1rem;">
                    <label for="dump-outdoor-toggle" style="color: var(--text-secondary);">Attività all'aperto?</label>
                    <label class="switch">
                        <input type="checkbox" id="dump-outdoor-toggle">
                        <span class="slider round"></span>
                    </label>
                </div>

                <div style="text-align: center; margin-top: 4rem; display: flex; justify-content: center; gap: 1rem;">
                    <button id="btn-cancel-dump" class="btn-secondary fade-up delay-2">Annulla</button>
                    <button id="btn-save-dump" class="btn-primary fade-up delay-2" style="margin: 0;">Salva</button>
                </div>
            </div>
        </section>

        <!-- VIEW 4: TASK LIST -->
        <section id="view-list" class="view">
            <button id="btn-close-list" class="top-left-btn fade-up" aria-label="Chiudi">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>

            <div class="content-wrapper align-start" style="padding-top: 10vh; max-width: 100%; overflow-y: auto;">
                <h1 class="dump-title fade-up" style="margin-bottom: 1rem;">Tutte le attività</h1>

                <div id="task-list-container" class="fade-up delay-1"
                    style="width: 100%; margin-top: 1rem; padding-bottom: 4rem;">
                    <!-- List items generated by app.js -->
                </div>
            </div>
        </section>

    </div>

    <div id="toast" class="toast">Salvato.</div>

    <script src="./app.js"></script>

    <!-- Register Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch((err) => {
                        console.error('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>

</html>
